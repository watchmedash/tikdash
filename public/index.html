<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Race</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
  }

  #bars-list { position: relative; }

  .bar-row {
    position: absolute; left: 0; right: 0;
    height: 38px;
    transition: top .65s cubic-bezier(.25,1,.5,1);
  }

  .bar-gift {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
  }
  .bar-gift img { width: 100%; height: 100%; object-fit: contain; }

  .bar-track {
    width: 100%; position: relative; height: 38px;
    background: #ececec; border-radius: 0; overflow: visible;
  }

  .bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 0;
    transition: width .5s cubic-bezier(.25,1,.5,1);
    min-width: 24px;
  }

  .bar-avatar {
    position: absolute; right: 0; top: 50%; transform: translate(50%, -50%);
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    background: rgba(255,255,255,0.35);
    overflow: hidden; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    z-index: 2;
  }
  .bar-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .bar-pts {
    position: absolute; left: calc(100% + 22px); top: 50%; transform: translateY(-50%);
    font-size: 13px; font-weight: 700; color: #333;
    white-space: nowrap;
  }

  #empty-msg {
    text-align: center; padding: 60px 0;
    font-size: 14px; color: #aaa;
  }
</style>
</head>
<body>

<div id="bars-list">
  <div id="empty-msg">Waiting for gifts…</div>
</div>

<script>
const WS = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
let socket;
let racers = [];
const ROW_H = 41;

function initWS() {
  socket = new WebSocket(WS);
  socket.onmessage = e => handle(JSON.parse(e.data));
  socket.onclose = () => setTimeout(initWS, 1000);
  socket.onerror = () => socket.close();
}

function handle(msg) {
  if (msg.type === 'init' || msg.type === 'point_update') {
    racers = msg.racers || [];
    render();
  }
}

function render() {
  const list = document.getElementById('bars-list');
  const all = racers; // all 12 countries, always shown
  const maxPts = all[0]?.points || 1;

  const em = document.getElementById('empty-msg');
  if (em) em.remove();

  list.style.height = `${all.length * ROW_H}px`;

  all.forEach((r, i) => {
    const pct = Math.max(2, (r.points / maxPts) * 72);

    let row = document.getElementById(`row-${r.id}`);
    if (!row) {
      row = document.createElement('div');
      row.id = `row-${r.id}`;
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="bar-track">
          <div class="bar-fill" style="background:${r.color}">
            <div class="bar-avatar" id="av-${r.id}">
              <img src="https://flagcdn.com/w80/${r.code}.png" alt="${r.name}">
            </div>
            <div class="bar-pts" id="pts-${r.id}">${fmtPts(r.points, r.name)}</div>
          </div>
        </div>
        <div class="bar-gift">
          <img src="/gifts/${r.id}.png" alt="" onerror="this.parentElement.style.display='none'">
        </div>
      `;
      row.style.top = `${all.length * ROW_H}px`;
      list.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        row.style.top = `${i * ROW_H}px`;
      }));
    } else {
      row.style.top = `${i * ROW_H}px`;
      row.querySelector('.bar-fill').style.width = `${pct}%`;
      document.getElementById(`pts-${r.id}`).textContent = fmtPts(r.points, r.name);
    }
  });
}

function fmtPts(n, name) {
  return n + ' ' + name;
}

initWS();
</script>
</body>
</html>
